<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <link rel="stylesheet" href="./script/css/styles.css">

        <link href='https://cdn.jsdelivr.net/npm/boxicons@2.0.5/css/boxicons.min.css' rel='stylesheet'>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/jpswalsh/academicons@1/css/academicons.min.css">
        
        <title>Zhenyang Huang</title>
        
        <style>
            /* 自定义学术样式 */
            .education__list { list-style: none; padding-left: 0; }
            .education__item { margin-bottom: 1.5rem; border-left: 3px solid var(--first-color); padding-left: 1rem; }
            .research__icon-container { display: flex; gap: 2rem; font-size: 3rem; margin-top: 1.5rem; }
            .research__icon-container a { color: var(--second-color); transition: color 0.3s; }
            .research__icon-container a:hover { color: var(--first-color); }
            .home__title { font-size: 2.5rem; }
            
            /* 强制首页大头照变成正圆形，并增加一点阴影质感 */
            .home__img img {
                border-radius: 50%;
                object-fit: cover;
                aspect-ratio: 1/1;
                box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            }
        </style>
    </head>
    <body>
        <header class="l-header">
            <nav class="nav bd-grid">
                <div><a href="#" class="nav__logo">Zhenyang Huang</a></div>
                <div class="nav__menu" id="nav-menu">
                    <ul class="nav__list">
                        <li class="nav__item"><a href="#home" class="nav__link active">Home</a></li>
                        <li class="nav__item"><a href="#about" class="nav__link">About</a></li>
                        <li class="nav__item"><a href="#education" class="nav__link">Education</a></li>
                        <li class="nav__item"><a href="#research" class="nav__link">Research</a></li>
                        <li class="nav__item"><a href="#contact" class="nav__link">Contact & CV</a></li>
                    </ul>
                </div>
                <div class="nav__toggle" id="nav-toggle"><i class='bx bx-menu'></i></div>
            </nav>
        </header>

        <main class="l-main">
            <div id="section-home"></div>
            <div id="section-about"></div>
            <div id="section-education"></div>
            <div id="section-research"></div>
            <div id="section-contact"></div>
        </main>

        <footer class="footer">
            <p class="footer__title">Zhenyang Huang</p>
            <div class="footer__social">
                <a href="https://github.com/hzy24" class="footer__icon" target="_blank"><i class='bx bxl-github' ></i></a>
            </div>
            <p>&#169; 2026 Zhenyang Huang. All rights reserved.</p>
        </footer>

        <script src="https://unpkg.com/scrollreveal"></script>
        <script>
            // 1. 定义需要加载的模块列表
            const sections = [
                { id: 'section-home', url: './sections/home.html' },
                // { id: 'section-about', url: './sections/about.html' },
                { id: 'section-education', url: './sections/education.html' },
                { id: 'section-research', url: './sections/research.html' },
                { id: 'section-contact', url: './sections/contact.html' }
            ];

            // 2. 使用原生 fetch API 异步加载所有模块
            async function loadSectionsAndInit() {
                try {
                    // 并发请求所有 HTML 片段
                    const loadPromises = sections.map(async (section) => {
                        const response = await fetch(section.url);
                        if (!response.ok) throw new Error(`Failed to load ${section.url}`);
                        const html = await response.text();
                        document.getElementById(section.id).innerHTML = html;
                    });

                    // 等待所有片段都被成功塞进 DOM
                    await Promise.all(loadPromises);
                    console.log("所有 HTML 模块加载并渲染完毕！");

                    // 3. 此时 DOM 已经完整，初始化导航栏等 UI 逻辑
                    initMainJS();

                    // 4. 重磅：精准唤醒 ScrollReveal 飘字/飘图动画
                    initScrollReveal();

                } catch (error) {
                    console.error("模块加载出错:", error);
                }
            }

            // UI 逻辑初始化函数（提取自原 main.js 的核心部分）
            function initMainJS() {
                const navMenu = document.getElementById('nav-menu'),
                      navToggle = document.getElementById('nav-toggle'),
                      navClose = document.getElementById('nav-close');
                      
                if(navToggle){ navToggle.addEventListener('click', () =>{ navMenu.classList.add('show') }) }
                if(navClose){ navClose.addEventListener('click', () =>{ navMenu.classList.remove('show') }) }

                const navLink = document.querySelectorAll('.nav__link');
                function linkAction(){
                    const navMenu = document.getElementById('nav-menu');
                    navMenu.classList.remove('show');
                }
                navLink.forEach(n => n.addEventListener('click', linkAction));

                const sectionsDOM = document.querySelectorAll('section[id]');
                window.addEventListener('scroll', scrollActive);
                function scrollActive(){
                    const scrollY = window.pageYOffset;
                    sectionsDOM.forEach(current =>{
                        const sectionHeight = current.offsetHeight;
                        const sectionTop = current.offsetTop - 50;
                        let sectionId = current.getAttribute('id');
                        if(scrollY > sectionTop && scrollY <= sectionTop + sectionHeight){
                            document.querySelector('.nav__menu a[href*=' + sectionId + ']').classList.add('active');
                        }else{
                            document.querySelector('.nav__menu a[href*=' + sectionId + ']').classList.remove('active');
                        }
                    });
                }
            }

            // ScrollReveal 动画引擎
            function initScrollReveal() {
                // 先销毁可能存在的旧实例，确保干净启动
                if(window.sr) { window.sr.destroy(); }
                
                const sr = ScrollReveal({
                    origin: 'top',
                    distance: '80px',
                    duration: 2000,
                    reset: true // 每次滚动回去都会重新飘出
                });

                // --- 首页 (Home) ---
                sr.reveal('.home__title', {}); 
                sr.reveal('.home__subtitle', { delay: 200 }); 
                sr.reveal('.home__data p', { delay: 300 }); // 你新加的段落
                sr.reveal('.button', { delay: 400 }); 
                sr.reveal('.home__img', { delay: 400, origin: 'right' }); // 大头照从右侧飘入
                sr.reveal('.home__social-icon', { interval: 200, origin: 'left' }); 

                // --- 关于我 (About) ---
                sr.reveal('.about__img', { origin: 'left' }); 
                sr.reveal('.about__subtitle', { delay: 200 }); 
                sr.reveal('.about__text', { delay: 400, interval: 200 }); 

                // --- 教育背景 (Education) ---
                sr.reveal('.section-title', { origin: 'top' }); // 所有大标题
                sr.reveal('.education__item', { origin: 'bottom', distance: '40px', delay: 100, interval: 200 }); 

                // --- 科研 (Research) ---
                sr.reveal('.research__icon-container a', { origin: 'bottom', distance: '20px', delay: 200, interval: 150 });

                // --- 联系方式 (Contact) ---
                sr.reveal('.contact__subtitle', { delay: 200 });
                sr.reveal('.contact__container .button', { origin: 'bottom', distance: '30px', delay: 400, interval: 200 });
                
                console.log("ScrollReveal 动画绑定完毕！");
            }

            // 启动引擎！
            window.addEventListener('DOMContentLoaded', loadSectionsAndInit);
        </script>
    </body>
</html>
