<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style/style.css" type="text/css"/>
    
    <link rel="icon" href="./img/icon.jpg" sizes="32x32" />
    <link rel="icon" href="./img/icon.jpg" sizes="192x192" />
    <link rel="apple-touch-icon-precomposed" href="./img/icon.jpg" />
    <meta name="msapplication-TileImage" content="./img/icon.jpg" />
    
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    
    <title>Zhenyang Huang | Home</title>

    <style>
        /* 重置背景，确保深邃 */
        body, html {
            height: 100%;
            margin: 0;
            background-color: #1e1e1e !important; /* VS Code 默认深色背景 */
            color: #d4d4d4 !important; /* VS Code 默认文字颜色 */
            overflow-x: hidden;
        }
        
        /* 修复排版层级 */
        .hero_section {
            position: relative;
            height: 100vh;
            display: flex;
            align-items: center;
            z-index: 2; /* 确保文字在粒子上方 */
            background: transparent !important;
        }
        
        #particles-js {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1; /* 确保粒子在最底层 */
            background-color: #1e1e1e;
        }

        /* 修复名字排版：消除原CSS过大的行高 */
        h1.my-name {
            font-size: 3.5rem !important;
            font-weight: 800 !important;
            line-height: 1.2 !important;
            margin-bottom: 10px !important;
            color: #ffffff !important;
        }

        /* VS Code 蓝的主题色 */
        .vscode-blue {
            color: #007acc !important; 
        }

        /* 修复按钮：变成精简的线框按钮，带有图标和光晕 */
        .btn-profile {
            background-color: transparent !important;
            color: #ffffff !important;
            border: 2px solid #007acc !important; /* VS Code 蓝 */
            border-radius: 8px !important; /* 微圆角，更现代 */
            padding: 12px 36px !important; /* 核心修复：调整内边距以容纳图标和长文本 */
            font-weight: 600 !important;
            font-size: 1.1rem !important;
            transition: all 0.3s ease !important;
            white-space: nowrap !important; /* 核心修复：绝对不换行 */
            display: inline-flex !important; /* 核心修复：容纳图标 */
            align-items: center !important;
            text-decoration: none !important;
        }
        
        .btn-profile:hover {
            background-color: #007acc !important; /* 悬停时填满颜色 */
            color: #ffffff !important;
            box-shadow: 0 0 20px rgba(0, 122, 204, 0.6) !important; /* 更强的 VSCode 蓝光晕 */
        }

        /* 图标样式 */
        .btn-profile i {
            margin-left: 10px !important;
            transition: transform 0.3s ease !important;
        }
        
        .btn-profile:hover i {
            transform: translateX(5px) !important; /* 悬停时图标右移 */
        }

        /* 修复照片排版 */
        .hero_section img {
            max-width: 65% !important;
            border-radius: 50% !important;
            box-shadow: 0 0 30px rgba(0,0,0,0.6) !important;
            border: 3px solid #007acc !important; /* 加一圈VSCode蓝的边框更搭 */
        }
    </style>
</head>
<body>
    <div id="particles-js"></div>

    <div class="hero_section">
        <div class="container">
            <div class="row align-items-center">
                <div class="col-lg-6 col-md-6 col-sm-12 col-xs-12">
                    <p style="font-size: 1.2rem; color: #858585; margin-bottom: 5px;">Hello! I'm</p>
                    
                    <h1 class="my-name">
                        <span class="vscode-blue">Zhenyang</span> Huang
                    </h1>
                    
                    <h2 style="font-size: 1.8rem; font-weight: 600; margin-bottom: 20px; color: #cccccc;">
                        AI for Astrophysics
                    </h2>
                    
                    <p style="font-size: 1.1rem; line-height: 1.6; color: #a6a6a6; max-width: 95%;">
                        I am a Master's student in Astronomy at the Xinjiang Astronomical Observatory, Chinese Academy of Sciences. 
                        I wanna bridge the gap between complex astrophysical datasets and fundamental physical laws using machine learning models.
                    </p>
                    
                    <div class="btn_container" style="margin-top: 35px;">
                        <a href="./portfolio/index.html" style="text-decoration: none;">
                            <button class="btn btn-profile animate__animated animate__fadeInUp">
                                Academic Profile <i class="fa fa-angle-right"></i>
                            </button>
                        </a>
                    </div>
                </div>
                <div class="col-lg-6 col-md-6 col-sm-12 col-xs-12 mt-5 mt-lg-0">
                    <center>
                        <img src="./img/profile.png" alt="Zhenyang Huang" class="animate__animated animate__zoomIn">
                    </center>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    
    <script>
        particlesJS('particles-js', {
            "particles": {
                "number": { "value": 80, "density": { "enable": true, "value_area": 800 } },
                "color": { "value": ["#ffffff", "#007acc"] }, /* 粒子颜色加入了VS Code蓝呼应主题 */
                "shape": { "type": "circle" },
                "opacity": { 
                    "value": 0.6, "random": true, 
                    "anim": { "enable": true, "speed": 1, "opacity_min": 0.1, "sync": false } 
                },
                "size": { 
                    "value": 3, "random": true, 
                    "anim": { "enable": false, "speed": 10, "size_min": 0.1, "sync": false } 
                },
                "line_linked": { 
                    "enable": true, "distance": 150, "color": "#ffffff", "opacity": 0.2, "width": 1 
                },
                "move": { 
                    "enable": true, "speed": 1.5, "direction": "none", "random": false, 
                    "straight": false, "out_mode": "out", "bounce": false 
                }
            },
            "interactivity": {
                "detect_on": "canvas",
                "events": {
                    "onhover": { "enable": true, "mode": "grab" },
                    "onclick": { "enable": true, "mode": "push" }
                },
                "modes": {
                    "grab": { "distance": 180, "line_linked": { "opacity": 0.6 } },
                    "push": { "particles_nb": 3 }
                }
            },
            "retina_detect": true
        });
    </script>
</body>
</html>
