<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style/style.css" type="text/css"/>
    
    <link rel="icon" href="./img/icon.jpg" sizes="32x32" />
    <link rel="icon" href="./img/icon.jpg" sizes="192x192" />
    <link rel="apple-touch-icon-precomposed" href="./img/icon.jpg" />
    <meta name="msapplication-TileImage" content="./img/icon.jpg" />
    
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.16.0/umd/popper.min.js"></script>

    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">   
    
    <title>Zhenyang Huang | Home</title>

    <style>
        /* 强制覆盖部分样式：确保背景深邃，且粒子效果严格在最底层 */
        body, html {
            height: 100%;
            margin: 0;
            overflow-x: hidden;
            background-color: #0b0c10; /* 深邃的星空底色 */
            color: #ffffff; 
        }
        .hero_section {
            position: relative;
            height: 100vh;
            display: flex;
            align-items: center;
            z-index: 1; /* 确保文字内容在粒子上方 */
        }
        #particles-js {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0; /* 粒子在内容下方 */
        }
        /* 优化按钮质感 */
        .btn-light {
            background-color: transparent;
            color: #ffffff;
            border: 2px solid #ffffff;
            border-radius: 30px;
            padding: 10px 25px;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        .btn-light:hover {
            background-color: #ffffff;
            color: #000000;
        }
        /* 优化照片展示方式 */
        .hero_section img {
            max-width: 70%;
            border-radius: 50%; /* 把照片裁成圆形，更符合学术审美 */
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body>
    <div id="particles-js"></div>

    <div class="hero_section">
        <div class="container">
            <div class="row align-items-center">
                <div class="col-lg-6 col-md-6 col-ms-12 col-xs-12">
                    <h3>Hello!</h3>
                    <h1>I'm <span style="color: #45a29e;">Zhenyang Huang</span></h1>
                    <h2 style="font-size: 1.8rem; margin-top: 15px; margin-bottom: 20px;">Astrophysics & Interpretable AI</h2>
                    <p style="font-size: 1.1rem; line-height: 1.6; color: #c5c6c7;">
                        I am a Master's student in Astronomy at the Xinjiang Astronomical Observatory, Chinese Academy of Sciences. 
                        I wanna to bridge the gap between complex astrophysical datasets and fundamental physical laws using machine learning model.
                    </p>
                    <div class="btn_container" style="margin-top: 30px;">
                        <a href="./portfolio/index.html"><button class="btn btn-light animate__animated animate__fadeInUp">View Academic Profile</button></a>
                    </div>
                </div>
                <div class="col-lg-6 col-md-6 col-ms-12 col-xs-12 mt-5 mt-lg-0">
                    <center>
                        <img src="./img/profile.png" alt="Zhenyang Huang" class="animate__animated animate__zoomIn">
                    </center>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script type="text/javascript" src="./js/app.js"></script>
</body>
</html>
